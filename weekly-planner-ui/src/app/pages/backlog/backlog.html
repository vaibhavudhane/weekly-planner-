<div class="backlog-container">
  <div class="backlog-header">
    <h1>📋 Backlog</h1>
    <button
      mat-raised-button
      color="primary"
      *ngIf="roleSvc.isLead()"
      (click)="showForm = !showForm"
    >
      <mat-icon>add</mat-icon> Add Item
    </button>
  </div>

  <!-- Add form (lead only) -->
  <mat-card *ngIf="showForm" class="add-form">
    <mat-card-content>
      <mat-form-field appearance="outline" style="width: 100%">
        <mat-label>Title</mat-label>
        <input matInput [(ngModel)]="newItem.title" />
      </mat-form-field>
      <mat-form-field appearance="outline" style="width: 100%">
        <mat-label>Description</mat-label>
        <input matInput [(ngModel)]="newItem.description" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Category</mat-label>
        <mat-select [(ngModel)]="newItem.category">
          <mat-option [value]="1">Client Focused</mat-option>
          <mat-option [value]="2">Tech Debt</mat-option>
          <mat-option [value]="3">R&D</mat-option>
        </mat-select>
      </mat-form-field>
      <button mat-raised-button color="primary" (click)="addItem()">Save</button>
      <button mat-button (click)="showForm = false">Cancel</button>
    </mat-card-content>
  </mat-card>

  <!-- Category filter -->
  <div class="filter-row">
    <button
      mat-stroked-button
      *ngFor="let cat of [0, 1, 2, 3]"
      [color]="filterCat === cat ? 'primary' : ''"
      (click)="applyFilter(cat)"
    >
      {{ categoryLabel(cat) }}
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="loading-center">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <!-- Error -->
  <mat-card *ngIf="errorMessage" class="error-card">
    <mat-card-content>{{ errorMessage }}</mat-card-content>
  </mat-card>

  <!-- Items grid -->
  <div class="backlog-grid" *ngIf="!isLoading">
    <mat-card *ngFor="let item of filtered" class="backlog-item">
      <mat-card-header>
        <mat-card-title>{{ item.title }}</mat-card-title>
        <mat-card-subtitle>
          <mat-chip>{{ categoryLabel(item.category) }}</mat-chip>
        </mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>{{ item.description }}</mat-card-content>
      <mat-card-actions *ngIf="roleSvc.isLead()">
        <button mat-icon-button color="warn" (click)="deleteItem(item.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
