<mat-toolbar color="primary">
  <span>📅 Weekly Planner</span>
  <span style="flex: 1"></span>

  <a mat-button routerLink="/backlog" routerLinkActive="active-link">Backlog</a>
  <a mat-button routerLink="/planning" routerLinkActive="active-link">My Plan</a>

  @if (isLead()) {
    <a mat-button routerLink="/dashboard" routerLinkActive="active-link">Dashboard</a>
    <a mat-button routerLink="/weeks" routerLinkActive="active-link">Weeks</a>
  }

  <mat-form-field appearance="outline" style="width: 160px; margin: 0 12px">
    <mat-select
      [(ngModel)]="selected"
      (ngModelChange)="onSwitch($event)"
      [compareWith]="compareMembers"
    >
      @for (m of members; track m.id) {
        <mat-option [value]="m"> {{ m.name }} {{ m.isLead ? '👑' : '' }} </mat-option>
      }
    </mat-select>
  </mat-form-field>

  <button mat-icon-button (click)="toggleDark()" title="Toggle dark mode">
    <mat-icon>{{ isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>
